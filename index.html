.sync-btn{background:none;border:1px solid var(--bdr2);border-radius:4px;padding:4px 10px;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;transition:.12s}

/* nav */

/* hero */

.hw{font-size:18px;font-weight:900;margin-top:8px;color:#fff}

.btn{padding:11px 16px;border-radius:6px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.05em;transition:.12s;text-transform:uppercase}

// ==============================
const plr=n=>PL.find(p=>p.name===n);
const rem=()=>SC.filter(s=>!ST.pk[s.n]);
const ppk=n=>Object.entries(ST.pk).filter(([,v])=>v.pl===n).sort((a,b)=>a[1].ri-b[1].ri);
const done=()=>ST.ri>=RD.length;
const cr=()=>RD[ST.ri];
const cw=()=>getWV(ST.ri)[ST.wi];
function pki(nm){const p=ST.pk[nm];if(!p)return null;return{...p,pl:plr(p.pl),rd:RD[p.ri]};}
function wns(s){return Object.values(ST.rs).filter(w=>w===s).length;}
function isOut(s){
  // 全試合結果を見て、sが負けた試合があればtrue
  for(const [mid,w] of Object.entries(ST.rs)){
    if(w && w!==s){
      // この試合にsが出場していたか確認
      const l=loser(mid,w);
      if(l===s)return true;
    }
  }
  return false;
}
function loser(mid,w){
  if(mid.startsWith('r1_')){const i=+mid.split('_')[1];return R1P[i].find(s=>s!==w)||null;}
  if(mid.startsWith('r2_')){const i=+mid.split('_')[1];const a=ST.rs[`r1_${i*2}`],b=ST.rs[`r1_${i*2+1}`];return a&&b?(a===w?b:a):null;}
  if(mid.startsWith('qf_')){const i=+mid.split('_')[1];const a=ST.rs[`r2_${i*2}`],b=ST.rs[`r2_${i*2+1}`];return a&&b?(a===w?b:a):null;}
  if(mid.startsWith('sf_')){const i=+mid.split('_')[1];const a=ST.rs[`qf_${i*2}`],b=ST.rs[`qf_${i*2+1}`];return a&&b?(a===w?b:a):null;}
  if(mid==='final'){const a=ST.rs.sf_0,b=ST.rs.sf_1;return a&&b?(a===w?b:a):null;}
  return null;
}
function spts(s){
  const pk=ST.pk[s];if(!pk)return 0;
  const wr=pk.ri+1;let pts=0;
  Object.entries(ST.rs).forEach(([mid,w])=>{
    if(w!==s)return;let p=30;
    const ls=loser(mid,w);if(ls&&ST.pk[ls]){const lr=ST.pk[ls].ri+1;if(wr>lr)p+=(wr-lr)*10;}
    if(mid==='final')p+=70;pts+=p;
  });
  if(ST.rs.final){const fl=loser('final',ST.rs.final);if(fl===s)pts+=30;}
  return pts;
}
function allScores(){
  const sc={};PL.forEach(p=>{sc[p.name]={tot:0,w:0,b8:0};});
  Object.entries(ST.rs).forEach(([mid,w])=>{
    const pk=ST.pk[w];if(!pk)return;
    const wr=pk.ri+1;let p=30;
    const ls=loser(mid,w);if(ls&&ST.pk[ls]){const lr=ST.pk[ls].ri+1;if(wr>lr)p+=(wr-lr)*10;}
    if(mid==='final')p+=70;sc[pk.pl].tot+=p;sc[pk.pl].w+=1;
  });
  if(ST.rs.final){const fl=loser('final',ST.rs.final);if(fl&&ST.pk[fl])sc[ST.pk[fl].pl].tot+=30;}
  const b8={};PL.forEach(p=>b8[p.name]=0);
  for(let i=0;i<8;i++){const w=ST.rs[`r2_${i}`];if(w&&ST.pk[w])b8[ST.pk[w].pl]++;}
  const mx=Math.max(...Object.values(b8),0);
  if(mx>0){const tops=PL.filter(p=>b8[p.name]===mx);const bon=tops.length===1?50:tops.length===2?30:20;tops.forEach(p=>{sc[p.name].tot+=bon;sc[p.name].b8=b8[p.name];});}
  return sc;
}

// ==============================
// 未解決競合を計算
// ==============================
function getPendingConflicts(){
  // sd のうち複数人が同じ学校を選んでいて、まだ pk に入っていないもの
  const grp={};
  Object.entries(ST.sd).forEach(([pl,s])=>{
    if(ST.pk[s]) return; // すでに確定済み
    if(!grp[s])grp[s]=[];
    grp[s].push(pl);
  });
  return Object.entries(grp).filter(([,ps])=>ps.length>1).map(([s,ps])=>({school:s,players:ps}));
}

function rDraft(){

    return;
  }
  if(ST.ri!==0){el.innerHTML=rWaiver();return;}
  // S巡フロー
  if(ST.so){
    const pending=getPendingConflicts();
    if(pending.length>0){el.innerHTML=rSReveal();return;}   // 未解決競合あり→開票画面
    if(ST.snr.length>0){                                    // 全競合解決済み→再指名フェーズ
      if(ST.snro){
        const rPending=getRepickConflicts();
        if(rPending.length>0){el.innerHTML=rSRepickReveal();return;} // 再指名も競合
        if(anyRepickPending()){el.innerHTML=rSRepickReveal();return;} // 確定待ち
        el.innerHTML=rSRepickReveal();return;
      }
      el.innerHTML=rSRepickSelect();return;
    }
    el.innerHTML=rSReveal();return;                         // 全員確定→A巡ボタン
  }
  el.innerHTML=rSSelect();
}

function showAmida(school, players){
  // 競合者のみに絞る
  const conflictPlayers = players.filter(p => !ST.pk[school] || ST.pk[school].pl === p);
  amidaContext={school, players:conflictPlayers};
  amidaWinner=null;

  // 既に結果がある場合は結果を表示
  const existingWinner = ST.amidaResults && ST.amidaResults[school];

  document.getElementById('amida-school-name').textContent=`「${school}」の指名権`;
  document.getElementById('amida-note').textContent=`${conflictPlayers.join('・')} が競合しています`;

  const cards=document.getElementById('amida-cards');
  cards.innerHTML=conflictPlayers.map(name=>{
    const p=plr(name);
    return `<div class="amida-card" id="acard-${name}" style="background:${p.col}22;border-color:${p.col}55;color:${p.col}">${name}</div>`;
  }).join('');

  if(existingWinner){
    amidaWinner=existingWinner;
    document.getElementById('amida-result').textContent=`🎉 ${existingWinner} さんが当選！`;
    document.getElementById('amida-btn').style.display='none';
    document.getElementById('amida-confirm').style.display='block';
    conflictPlayers.forEach(name=>{
      const el=document.getElementById(`acard-${name}`);
      if(el){el.classList.remove('spin');el.classList.add(name===existingWinner?'win':'lose');}
    });
  } else {
    document.getElementById('amida-result').textContent='';
    document.getElementById('amida-btn').style.display='block';
    document.getElementById('amida-btn').textContent='くじを引く！';
    document.getElementById('amida-btn').disabled=false;
    document.getElementById('amida-confirm').style.display='none';
  }

  document.getElementById('amida-overlay').classList.add('show');
}

function startAmida(){
  if(!amidaContext) return;
  document.getElementById('amida-btn').disabled=true;

  const {school, players}=amidaContext;
  // アニメーション開始
  players.forEach(name=>{
    const el=document.getElementById(`acard-${name}`);
    el.classList.add('spin');
    el.classList.remove('win','lose');
  });

  // 2秒後に結果を表示
  setTimeout(()=>{
    // ランダムに勝者を決定
    const winner=players[Math.floor(Math.random()*players.length)];
    amidaWinner=winner;

    players.forEach(name=>{
      const el=document.getElementById(`acard-${name}`);
      el.classList.remove('spin');
      if(name===winner)el.classList.add('win');
      else el.classList.add('lose');
    });

    document.getElementById('amida-result').textContent=`🎉 ${winner} さんが当選！`;
    document.getElementById('amida-note').textContent=`${winner}さんが「${school}」の指名権を獲得しました`;
    document.getElementById('amida-btn').style.display='none';
    document.getElementById('amida-confirm').style.display='block';
  }, 2000);
}

async function confirmAmida(){
  if(!amidaContext||!amidaWinner) return;
  const {school, players}=amidaContext;
  const winner=amidaWinner;
  const losers=players.filter(n=>n!==winner);

  // あみだ結果をFirebaseに保存（全員統一）
  if(!ST.amidaResults) ST.amidaResults={};
  ST.amidaResults[school]=winner;

  // 勝者の指名を確定
  ST.pk[school]={pl:winner, ri:0};

  // 再指名フェーズか初回S巡かを判定
  const isRepickPhase = ST.snr.length>0 && players.some(n=>ST.snr.includes(n));

  if(isRepickPhase){
    // 再指名フェーズ: 敗者を再び再指名キューへ戻し、次ラウンドの選択をリセット
    const newSnr=losers.filter(n=>ST.snr.includes(n));
    // snrを敗者だけに絞って再選択させる
    ST.snr=newSnr;
    ST.snrd={};ST.snrs={};ST.snro=false;
  } else {
    // 初回S巡: 敗者を再指名キューに追加
    losers.forEach(l=>{if(!ST.snr.includes(l))ST.snr.push(l);});
  }

  await sv();
  document.getElementById('amida-overlay').classList.remove('show');
  amidaContext=null;
  amidaWinner=null;
  rDraft();
}

// 学校名の表記ゆれを正規化
function normalizeName(n){
  if(!n||n==='null')return null;
  n=n.trim();
  const map={
    '八戸光星':'八戸学院光星','光星学院':'八戸学院光星',
    '九国大付':'九州国際大付','九州国際大附':'九州国際大付','九国大附':'九州国際大付','九州国際大付属':'九州国際大付',
    '神戸国際大附':'神戸国際大付','神国大附':'神戸国際大付',
    '智辯学園':'智弁学園','智辯':'智弁学園',
    '東洋大姫路高校':'東洋大姫路','東洋大付姫路':'東洋大姫路','東洋大学附属姫路':'東洋大姫路',
    '大阪桐蔭高校':'大阪桐蔭','桐蔭':'大阪桐蔭',
    '横浜高校':'横浜','帝京高校':'帝京',
    '花咲徳栄高校':'花咲徳栄','山梨学院高校':'山梨学院',
    '花巻東高校':'花巻東','八戸学院光星高校':'八戸学院光星',
    '神村学園高校':'神村学園','沖縄尚学高校':'沖縄尚学',
    '帝京長岡高校':'帝京長岡','高川学園高校':'高川学園',
  };
  return map[n]||n;
}

// R1Pの対戦から正しいmatch IDにマッピング
// fetchしたデータは「勝者校名→どの試合か」を逆引きする
function applyFetchedResults(fetched){
  // fetchedは {matchId: winner} の形式で来る想定
  // validなキー
  const VALID_KEYS=[
    'r1_0','r1_1','r1_2','r1_3','r1_4','r1_5','r1_6','r1_7',
    'r1_8','r1_9','r1_10','r1_11','r1_12','r1_13','r1_14','r1_15',
    'r2_0','r2_1','r2_2','r2_3','r2_4','r2_5','r2_6','r2_7',
    'qf_0','qf_1','qf_2','qf_3','sf_0','sf_1','final'
  ];
  let updated=0;
  VALID_KEYS.forEach(k=>{
    const raw=fetched[k];
    if(!raw||raw==='null')return;
    const norm=normalizeName(String(raw));
    const valid=SC.some(s=>s.n===norm);
    if(!valid){console.warn('不明な学校名:',raw,'→',norm);return;}
    if(ST.rs[k]!==norm){ST.rs[k]=norm;updated++;}
  ST.fetchLocked=true;
  });
  return updated;
}

async function fetchResults(){
  const btn=document.getElementById('fbtn');
  const statusEl=document.getElementById('fs');
  if(btn)btn.disabled=true;
  fetchClass='loading';
  fetchLog='⏳ 取得中...';
  if(statusEl){statusEl.className='fetch-status loading';statusEl.textContent=fetchLog;}

  // プロキシ経由で高校野球ニュースサイトを取得
  const TARGET='https://www.xn--8wv97xz6xo7h.online/senbatsu-koshien-team/';
  const PROXIES=[
    `https://corsproxy.io/?${encodeURIComponent(TARGET)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(TARGET)}`,
  ];

  async function tryFetch(url,ms){
    return new Promise((res,rej)=>{
      const t=setTimeout(()=>rej(new Error('タイムアウト')),ms);
      fetch(url).then(async r=>{
        clearTimeout(t);
        if(!r.ok)throw new Error('HTTP '+r.status);
        const text=await r.text();
        let j; try{j=JSON.parse(text);}catch(e){j=null;}
        res(j&&j.contents?j.contents:text);
      }).catch(e=>{clearTimeout(t);rej(e);});
    });
  }

  let html=null;
  for(const proxy of PROXIES){
    try{
      const result=await tryFetch(proxy,15000);
      if(result&&result.length>500){html=result;break;}
    }catch(e){continue;}
  }

  if(!html){
    fetchClass='err';
    fetchLog='❌ 取得失敗: '+e.message;
    if(statusEl){statusEl.className='fetch-status err';statusEl.textContent=fetchLog;}
    if(btn)btn.disabled=false;
    return;
  }

  if(!html||html.length<500){
    fetchClass='err';
    fetchLog='❌ 取得失敗: ページが取得できませんでした';
    if(statusEl){statusEl.className='fetch-status err';statusEl.textContent=fetchLog;}
    if(btn)btn.disabled=false;
    return;
  }

  // ページ内のテキストを取得
  const parser=new DOMParser();
  const doc=parser.parseFromString(html,'text/html');
  const bodyText=(doc.body?.innerText||doc.body?.textContent||'').replace(/[ \t]+/g,' ');

  const fetched={};

  // サイトの学校名マッピング（略称 → アプリ内名称）
  const nameMap={
    '八学光星':'八戸学院光星','高知農業':'高知農','神戸国際大':'神戸国際大付',
    '九国大付':'九州国際大付','帝京高校':'帝京'
  };
  function normSite(n){
    n=n.trim();
    return nameMap[n]||n;
  }

  // パターン1: 試合後形式 "校名A 数字-数字 校名B" (例: 沖縄尚学 3-4 帝京高校)
  const resultPat=/([^\s\d　]{2,10})\s+(\d+)[-−ー]+(\d+)\s+([^\s\d　]{2,10})/g;
  let m1;
  while((m1=resultPat.exec(bodyText))!==null){
    const a=normSite(m1[1]),sa=parseInt(m1[2]),sb=parseInt(m1[3]),b=normSite(m1[4]);
    if(sa===sb)continue;
    const winner=sa>sb?a:b;
    R1P.forEach((pair,i)=>{
      const [ra,rb]=pair;
      if((ra===a&&rb===b)||(ra===b&&rb===a)){
        if(!fetched['r1_'+i])fetched['r1_'+i]=winner;
      }
    });
  }

  // パターン2: vs形式でスコア行から判定 (試合前→試合後で変わる場合)
  const vsPat=/([^\s　]{2,10})\s+vs\s+([^\s　]{2,10})/gi;
  let vm;
  while((vm=vsPat.exec(bodyText))!==null){
    const a=normSite(vm[1]),b=normSite(vm[2]);
    const after=bodyText.slice(vm.index+vm[0].length,vm.index+vm[0].length+300);
    const scores=[];
    const sp=/＝(\d+)/g;let sm;
    while((sm=sp.exec(after))!==null&&scores.length<2)scores.push(parseInt(sm[1]));
    if(scores.length===2&&scores[0]!==scores[1]){
      const winner=scores[0]>scores[1]?a:b;
      R1P.forEach((pair,i)=>{
        const [ra,rb]=pair;
        if((ra===a&&rb===b)||(ra===b&&rb===a)){
          if(!fetched['r1_'+i])fetched['r1_'+i]=winner;
        }
      });
    }
  }

  const updated=applyFetchedResults(fetched);
  if(updated>0)await sv();

  const now=new Date().toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  lastFetchTime=now;
  const found=Object.values(fetched).filter(Boolean).length;
  fetchClass='ok';
  fetchLog=found>0?`✅ ${now} — ${updated}試合更新（${found}試合検出）`:`✅ ${now} — 結果なし（試合前または未反映）`;
  rAll();
}

// 大会期間中の夜間（20時以降）に自動取得
async function autoFetchIfNeeded(){
  const now=new Date();
  const jst=new Date(now.getTime()+9*3600*1000);
  const y=jst.getUTCFullYear(),m=jst.getUTCMonth()+1,d=jst.getUTCDate(),h=jst.getUTCHours();
  // 大会期間: 2026/3/19〜4/4
  const inPeriod=(y===2026&&((m===3&&d>=19)||(m===4&&d<=4)));

  await fetchResults();
}

    </div>
  </div>`;
}

function rScore(){
  const el=document.getElementById('pg-score');
  const sc=allScores();const sorted=PL.map(p=>({...p,s:sc[p.name]})).sort((a,b)=>b.s.tot-a.s.tot);
  const SK=['0P','2,000P','3,000P','5,000P'];const SKC=['sk0','sk2','sk3','sk4'];
  let h=`<div class="card"><div class="ch">順位表</div><table class="stbl"><tr><th>順位</th><th style="text-align:left">名前</th><th>勝</th><th>B8残</th><th>合計</th><th>賭け</th></tr>`;
  sorted.forEach((p,i)=>{h+=`<tr><td class="sr ${p.c}">${i+1}</td><td class="sn2 ${p.c}">${p.name}</td><td>${p.s.w}</td><td style="font-size:10px;color:var(--gold)">${p.s.b8>0?`${p.s.b8}校`:'-'}</td><td class="stot">${p.s.tot}</td><td class="${SKC[i]}" style="font-size:11px;font-weight:700">${SK[i]}</td></tr>`;});
  h+=`</table></div>`;
  PL.forEach(p=>{
    const pks=ppk(p.name);const s=sc[p.name];
    h+=`<div class="card ${p.bg} ${p.bc}" style="border:1px solid"><div class="ch ${p.c}">${p.name} — ${s.tot}pt（${s.w}勝）</div>`;
    pks.forEach(([school,info])=>{const rd=RD[info.ri];const pts=spts(school);const w=wns(school);const out=isOut(school);
  if(out){
    h+=`<div class="pi" style="color:#555"><span class="rt" style="background:#2a2a2a;color:#555">${rd.lb}</span><span style="margin-left:5px">${school}</span><span style="color:#444;font-size:10px;margin-left:4px">${w}勝</span><span class="pp-pts" style="color:#555">${pts>0?pts+'pt':'-'}</span></div>`;
  } else {
    h+=`<div class="pi"><span class="rt rt${rd.id}">${rd.lb}</span><span style="margin-left:5px">${school}</span><span style="color:var(--muted);font-size:10px;margin-left:4px">${w}勝</span><span class="pp-pts">${pts>0?pts+'pt':'-'}</span></div>`;
  }
});
    h+=`</div>`;
  });
  el.innerHTML=h;
}

// ==============================
// RENDER: CFG
// ==============================
function rCfg(){
  const fbStatus = fbReady
    ? '<div style="color:#6ee7b7;font-size:12px;font-weight:700">✅ Firebase接続済み — リアルタイム同期中</div>'
    : '<div style="color:#fca5a5;font-size:12px;font-weight:700">❌ Firebase未接続 — config設定が必要です</div>';
  const hakoneLabels=['4位','3位','2位','1位優勝'];
  const wvRows=WV_ODD.map((n,i)=>{const p=plr(n);return`<div><span class="${p.c}" style="font-weight:700">${i+1}番手：${n}</span><span style="color:var(--muted);font-size:11px;margin-left:8px">2026箱根 ${hakoneLabels[i]}</span></div>`;}).join('');
  const wvRowsB=WV_EVN.map((n,i)=>{const p=plr(n);return`<div><span class="${p.c}" style="font-weight:700">${i+1}番手：${n}</span></div>`;}).join('');
  document.getElementById('pg-cfg').innerHTML=`<div class="card"><div class="ch">Firebase状態</div>${fbStatus}<div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.8">接続中は全員の操作がリアルタイムで反映されます。</div></div><div class="card"><div class="ch">データ管理</div><button class="btn btn-r bblock" onclick="doReset()">🗑️ 全データをリセット</button><button class="btn btn-o bblock" style="margin-top:8px" onclick="unlockFetch()">🔓 手動入力ロックを解除</button></div><div class="card"><div class="ch">ウェーバー順</div><div style="font-size:12px;color:var(--muted);margin-bottom:6px">A/C/E/G巡</div><div style="font-size:13px;line-height:2.3;margin-bottom:10px">${wvRows}</div><div style="font-size:12px;color:var(--muted);margin-bottom:6px">B/D/F巡</div><div style="font-size:13px;line-height:2.3">${wvRowsB}</div></div>`;
}

// ==============================
// ACTIONS: S巡
// ==============================
function setLocalPlayer(name){
  localPlayer=name;
  rDraft();
}

async function submitS(){
  const sel=document.getElementById('s-school-sel');
  if(!sel||!sel.value){alert('学校を選択してください');return;}
  ST.sd[localPlayer]=sel.value;
  ST.ss[localPlayer]=true;
  await sv();
  rDraft();
}

function goRepick(){
  localPlayer=null;
  document.getElementById('pg-draft').innerHTML=rSRepickSelect();
}

async function openS(){
  if(!PL.every(p=>ST.ss[p.name])){alert('まだ全員が選択していません');return;}
  ST.so=true;
  // 競合なしの学校を自動確定
  const grp={};
  Object.entries(ST.sd).forEach(([pl,s])=>{if(!grp[s])grp[s]=[];grp[s].push(pl);});
  Object.entries(grp).forEach(([s,ps])=>{if(ps.length===1&&!ST.pk[s])ST.pk[s]={pl:ps[0],ri:0};});
  await sv();
  localPlayer=null; // 開票後はリセット
  rDraft();
}

async function finishS(){
  // 全員確定済みならA巡へ
  ST.sd={};ST.ss={};ST.so=false;ST.snr=[];ST.snrd={};ST.snrs={};ST.snro=false;ST.ri=1;ST.wi=0;
  await sv();rAll();
}

async function submitRepick(){
  const sel=document.getElementById('rp-school-sel');
  if(!sel||!sel.value){alert('学校を選択してください');return;}
  ST.snrd[localPlayer]=sel.value;
  ST.snrs[localPlayer]=true;
  await sv();
  rDraft();
}

async function openRepick(){
  if(!ST.snr.every(n=>ST.snrs[n])){alert('まだ全員が選択していません');return;}
  ST.snro=true;
  // 競合なし→自動確定
  const already=new Set(Object.keys(ST.pk));
  const grp={};
  Object.entries(ST.snrd).forEach(([pl,s])=>{if(!grp[s])grp[s]=[];grp[s].push(pl);});
  Object.entries(grp).forEach(([s,ps])=>{if(ps.length===1&&!already.has(s))ST.pk[s]={pl:ps[0],ri:0};});
  await sv();
  localPlayer=null;
  rDraft();
}

// ==============================
// ACTIONS: ウェーバー・結果
// ==============================
let _picking=false;
async function doPick(s){
  if(_picking)return;
  if(ST.pk[s]){alert('すでに指名済みです');return;}
  if(!localPlayer||localPlayer!==cw()){alert('あなたの番ではありません');return;}
  _picking=true;
  const pl=cw();ST.pk[s]={pl,ri:ST.ri,wi:ST.wi};ST.wi++;
  if(ST.wi>=getWV(ST.ri).length){ST.wi=0;ST.ri++;}
  localPlayer=null;
  await sv();rAll();
  _picking=false;
}
async function undoPick(){
  // 全指名の中で最後（wi最大・ri最大）のものを探して取り消す
  const all=Object.entries(ST.pk);
  if(!all.length){alert('取り消せる指名がありません');return;}
  // ri最大→その中でwi最大
  const last=all.sort((a,b)=>b[1].ri!==a[1].ri?b[1].ri-a[1].ri:b[1].wi-a[1].wi)[0];
  const lastRi=last[1].ri;
  const lastWi=last[1].wi;
  delete ST.pk[last[0]];
  ST.ri=lastRi;
  ST.wi=lastWi;
  localPlayer=null;
  await sv();rAll();
}
async function advRnd(){ST.wi=0;ST.ri++;await sv();rAll();}
async function clearR(mid){
  if(localPlayer!=='本川'){alert('修正は本川のみ可能です');return;}
  if(!confirm('この試合の結果を取り消しますか？'))return;
  delete ST.rs[mid];await sv();rResults();rScore();rPicks();
}

async function unlockFetch(){
  if(!confirm('自動取得ロックを解除して手動入力を許可しますか？'))return;
  ST.fetchLocked=false;await sv();rResults();rCfg();
}
async function setR(mid,w){
  if(ST.fetchLocked){alert('自動取得済みのため手動入力はロックされています');return;}
  if(ST.rs[mid]){return;} // 入力済みは変更不可
  ST.rs[mid]=w;await sv();rResults();rScore();rPicks();
}
async function forceSync(){rAll();}
async function doRefresh(btn){
  if(btn){btn.style.opacity='.4';btn.style.pointerEvents='none';}
  try{
    await new Promise((res,rej)=>{
      const t=setTimeout(()=>rej(new Error('timeout')),5000);
      window._fbListen((data)=>{
        clearTimeout(t);
        mergeData(data);
        rAll();
        res();
      });
    });
  }catch(e){rAll();}
  if(btn){btn.style.opacity='1';btn.style.pointerEvents='';}
}
async function doReset(){
  if(!confirm('全データをリセットしますか？\nこの操作は元に戻せません。'))return;
  ST={ri:0,wi:0,sd:{},ss:{},so:false,snr:[],snrd:{},snrs:{},snro:false,pk:{},rs:{}};
  localPlayer=null;await sv();rAll();
}

// ==============================
// NAV
// ==============================
let curPg='draft';
function gp(pg,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+pg).classList.add('on');
  if(btn)btn.classList.add('on');
  curPg=pg;rpg(pg);
}
function rpg(p){if(p==='draft')rDraft();else if(p==='picks')rPicks();else if(p==='results')rResults();else if(p==='score')rScore();else if(p==='rules')rRules();else if(p==='cfg')rCfg();}
function rAll(){rDraft();rPicks();rResults();rScore();rRules();rCfg();}

// Firebase未接続チェック用
let fbReady = false;

(()=>{
  // Firebaseリスナーが準備できるまで待つ
  const waitFb = setInterval(()=>{
    if(typeof window._fbListen !== 'function') return;
    clearInterval(waitFb);
    fbReady = true;

    // リアルタイムリスナー: Firebaseのデータが変わったら即反映
    window._fbListen((data)=>{
      mergeData(data);
      rAll();
    });

    // 大会期間中・20時以降なら自動取得（初回のみ）
    autoFetchIfNeeded();
    // 1時間ごとに自動再取得チェック
    setInterval(()=>autoFetchIfNeeded(), 3600000);
  }, 200);

  // Firebaseが5秒で繋がらなければオフラインモードで起動
  setTimeout(()=>{
    if(!fbReady){
      console.warn('Firebase未接続 — オフラインモードで起動');
      ST = EMPTY_ST();
      rAll();
    }
  }, 5000);
})();
