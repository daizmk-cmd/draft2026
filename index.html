function isOut(s){
  // 氓聟篓猫漏娄氓聬聢莽碌聬忙聻聹茫聜聮猫娄聥茫聛娄茫聙聛s茫聛聦猫虏聽茫聛聭茫聛聼猫漏娄氓聬聢茫聛聦茫聛聜茫聜聦茫聛掳true
  for(const [mid,w] of Object.entries(ST.rs)){
    if(w && w!==s){
      // 茫聛聯茫聛庐猫漏娄氓聬聢茫聛芦s茫聛聦氓聡潞氓聽麓茫聛聴茫聛娄茫聛聞茫聛聼茫聛聥莽垄潞猫陋聧
      const l=loser(mid,w);
      if(l===s)return true;
    }
  }
  return false;
}
function loser(mid,w){
  if(mid.startsWith('r1_')){const i=+mid.split('_')[1];return R1P[i].find(s=>s!==w)||null;}
  if(mid.startsWith('r2_')){const i=+mid.split('_')[1];const a=ST.rs[`r1_${i*2}`],b=ST.rs[`r1_${i*2+1}`];return a&&b?(a===w?b:a):null;}
  if(mid.startsWith('qf_')){const i=+mid.split('_')[1];const a=ST.rs[`r2_${i*2}`],b=ST.rs[`r2_${i*2+1}`];return a&&b?(a===w?b:a):null;}
  if(mid.startsWith('sf_')){const i=+mid.split('_')[1];const a=ST.rs[`qf_${i*2}`],b=ST.rs[`qf_${i*2+1}`];return a&&b?(a===w?b:a):null;}
  if(mid==='final'){const a=ST.rs.sf_0,b=ST.rs.sf_1;return a&&b?(a===w?b:a):null;}
  return null;
}
function spts(s){
  const pk=ST.pk[s];if(!pk)return 0;
  const wr=pk.ri+1;let pts=0;
  Object.entries(ST.rs).forEach(([mid,w])=>{
    if(w!==s)return;let p=30;
    const ls=loser(mid,w);if(ls&&ST.pk[ls]){const lr=ST.pk[ls].ri+1;if(wr>lr)p+=(wr-lr)*10;}
    if(mid==='final')p+=70;pts+=p;
  });
  if(ST.rs.final){const fl=loser('final',ST.rs.final);if(fl===s)pts+=30;}
  return pts;
}
function allScores(){
  const sc={};PL.forEach(p=>{sc[p.name]={tot:0,w:0,b8:0};});
  Object.entries(ST.rs).forEach(([mid,w])=>{
    const pk=ST.pk[w];if(!pk)return;
    const wr=pk.ri+1;let p=30;
    const ls=loser(mid,w);if(ls&&ST.pk[ls]){const lr=ST.pk[ls].ri+1;if(wr>lr)p+=(wr-lr)*10;}
    if(mid==='final')p+=70;sc[pk.pl].tot+=p;sc[pk.pl].w+=1;
  });
  if(ST.rs.final){const fl=loser('final',ST.rs.final);if(fl&&ST.pk[fl])sc[ST.pk[fl].pl].tot+=30;}
  const b8={};PL.forEach(p=>b8[p.name]=0);
  for(let i=0;i<8;i++){const w=ST.rs[`r2_${i}`];if(w&&ST.pk[w])b8[ST.pk[w].pl]++;}
  const mx=Math.max(...Object.values(b8),0);
  if(mx>0){const tops=PL.filter(p=>b8[p.name]===mx);const bon=tops.length===1?50:tops.length===2?30:20;tops.forEach(p=>{sc[p.name].tot+=bon;sc[p.name].b8=b8[p.name];});}
  return sc;
}

function getRepickConflicts(){
  const already=new Set(Object.keys(ST.pk));
  const grp={};
  Object.entries(ST.snrd).forEach(([pl,s])=>{
    if(already.has(s))return;
    if(!grp[s])grp[s]=[];
    grp[s].push(pl);
  });
  return Object.entries(grp).filter(([,ps])=>ps.length>1).map(([s,ps])=>({school:s,players:ps}));
}
function anyRepickPending(){
  return ST.snr.some(n=>!ST.pk[ST.snrd[n]]);

let amidaWinner=null;
let conflictList=[];

function showAmidaByIdx(idx){
  const c=conflictList[idx];
  if(!c)return;
  showAmida(c.school,c.players);
}

function showAmida(school, players){
  // 莽芦露氓聬聢猫聙聟茫聛庐茫聛驴茫聛芦莽碌聻茫聜聥
  const conflictPlayers = players.filter(p => !ST.pk[school] || ST.pk[school].pl === p);
  amidaContext={school, players:conflictPlayers};
  amidaWinner=null;

  // 忙聴垄茫聛芦莽碌聬忙聻聹茫聛聦茫聛聜茫聜聥氓聽麓氓聬聢茫聛炉莽碌聬忙聻聹茫聜聮猫隆篓莽陇潞
  const existingWinner = ST.amidaResults && ST.amidaResults[school];

  document.getElementById('amida-school-name').textContent=`茫聙聦${school}茫聙聧茫聛庐忙聦聡氓聬聧忙篓漏`;
  document.getElementById('amida-note').textContent=`${conflictPlayers.join('茫聝禄')} 茫聛聦莽芦露氓聬聢茫聛聴茫聛娄茫聛聞茫聛戮茫聛聶`;

  const cards=document.getElementById('amida-cards');
  cards.innerHTML=conflictPlayers.map(name=>{
    const p=plr(name);
    return `<div class="amida-card" id="acard-${name}" style="background:${p.col}22;border-color:${p.col}55;color:${p.col}">${name}</div>`;
  }).join('');

  if(existingWinner){
    amidaWinner=existingWinner;
    document.getElementById('amida-result').textContent=`冒聼聨聣 ${existingWinner} 茫聛聲茫聜聯茫聛聦氓陆聯茅聛赂茂录聛`;
    document.getElementById('amida-btn').style.display='none';
    document.getElementById('amida-confirm').style.display='block';
    conflictPlayers.forEach(name=>{
      const el=document.getElementById(`acard-${name}`);
      if(el){el.classList.remove('spin');el.classList.add(name===existingWinner?'win':'lose');}
    });
  } else {
    document.getElementById('amida-result').textContent='';
    document.getElementById('amida-btn').style.display='block';
    document.getElementById('amida-btn').textContent='茫聛聫茫聛聵茫聜聮氓录聲茫聛聫茂录聛';
    document.getElementById('amida-btn').disabled=false;
    document.getElementById('amida-confirm').style.display='none';
  }

  document.getElementById('amida-overlay').classList.add('show');
}

function startAmida(){
  if(!amidaContext) return;
  document.getElementById('amida-btn').disabled=true;

  const {school, players}=amidaContext;
  // 茫聜垄茫聝聥茫聝隆茫聝录茫聜路茫聝搂茫聝鲁茅聳聥氓搂聥
  players.forEach(name=>{
    const el=document.getElementById(`acard-${name}`);
    el.classList.add('spin');
    el.classList.remove('win','lose');
  });

  // 2莽搂聮氓戮聦茫聛芦莽碌聬忙聻聹茫聜聮猫隆篓莽陇潞
  setTimeout(()=>{
    // 茫聝漏茫聝鲁茫聝聙茫聝聽茫聛芦氓聥聺猫聙聟茫聜聮忙卤潞氓庐職
    const winner=players[Math.floor(Math.random()*players.length)];
    amidaWinner=winner;

    players.forEach(name=>{
      const el=document.getElementById(`acard-${name}`);
      el.classList.remove('spin');
      if(name===winner)el.classList.add('win');
      else el.classList.add('lose');
    });

    document.getElementById('amida-result').textContent=`冒聼聨聣 ${winner} 茫聛聲茫聜聯茫聛聦氓陆聯茅聛赂茂录聛`;
    document.getElementById('amida-note').textContent=`${winner}茫聛聲茫聜聯茫聛聦茫聙聦${school}茫聙聧茫聛庐忙聦聡氓聬聧忙篓漏茫聜聮莽聧虏氓戮聴茫聛聴茫聛戮茫聛聴茫聛聼`;
    document.getElementById('amida-btn').style.display='none';
    document.getElementById('amida-confirm').style.display='block';
  }, 2000);
}

async function confirmAmida(){
  if(!amidaContext||!amidaWinner) return;
  const {school, players}=amidaContext;
  const winner=amidaWinner;
  const losers=players.filter(n=>n!==winner);

  // 茫聛聜茫聛驴茫聛聽莽碌聬忙聻聹茫聜聮Firebase茫聛芦盲驴聺氓颅聵茂录聢氓聟篓氓聯隆莽碌卤盲赂聙茂录聣
  if(!ST.amidaResults) ST.amidaResults={};
  ST.amidaResults[school]=winner;

  // 氓聥聺猫聙聟茫聛庐忙聦聡氓聬聧茫聜聮莽垄潞氓庐職
  ST.pk[school]={pl:winner, ri:0};

  // 氓聠聧忙聦聡氓聬聧茫聝聲茫聜搂茫聝录茫聜潞茫聛聥氓聢聺氓聸聻S氓路隆茫聛聥茫聜聮氓聢陇氓庐職
  const isRepickPhase = ST.snr.length>0 && players.some(n=>ST.snr.includes(n));

  if(isRepickPhase){
    // 氓聠聧忙聦聡氓聬聧茫聝聲茫聜搂茫聝录茫聜潞: 忙聲聴猫聙聟茫聜聮氓聠聧茫聛鲁氓聠聧忙聦聡氓聬聧茫聜颅茫聝楼茫聝录茫聛赂忙聢禄茫聛聴茫聙聛忙卢隆茫聝漏茫聜娄茫聝鲁茫聝聣茫聛庐茅聛赂忙聤聻茫聜聮茫聝陋茫聜禄茫聝聝茫聝聢
    const newSnr=losers.filter(n=>ST.snr.includes(n));
    // snr茫聜聮忙聲聴猫聙聟茫聛聽茫聛聭茫聛芦莽碌聻茫聛拢茫聛娄氓聠聧茅聛赂忙聤聻茫聛聲茫聛聸茫聜聥
    ST.snr=newSnr;
    ST.snrd={};ST.snrs={};ST.snro=false;
  } else {
    // 氓聢聺氓聸聻S氓路隆: 忙聲聴猫聙聟茫聜聮氓聠聧忙聦聡氓聬聧茫聜颅茫聝楼茫聝录茫聛芦猫驴陆氓聤聽
    losers.forEach(l=>{if(!ST.snr.includes(l))ST.snr.push(l);});
  }

  await sv();
  document.getElementById('amida-overlay').classList.remove('show');
  amidaContext=null;
  amidaWinner=null;
  rDraft();
}

  el.innerHTML=h;

    '莽楼聻忙聢赂氓聸陆茅職聸氓陇搂茅聶聞':'莽楼聻忙聢赂氓聸陆茅職聸氓陇搂盲禄聵','莽楼聻氓聸陆氓陇搂茅聶聞':'莽楼聻忙聢赂氓聸陆茅職聸氓陇搂盲禄聵',
    '忙聶潞猫戮炉氓颅娄氓聹聮':'忙聶潞氓录聛氓颅娄氓聹聮','忙聶潞猫戮炉':'忙聶潞氓录聛氓颅娄氓聹聮',
    '忙聺卤忙麓聥氓陇搂氓搂芦猫路炉茅芦聵忙聽隆':'忙聺卤忙麓聥氓陇搂氓搂芦猫路炉','忙聺卤忙麓聥氓陇搂盲禄聵氓搂芦猫路炉':'忙聺卤忙麓聥氓陇搂氓搂芦猫路炉','忙聺卤忙麓聥氓陇搂氓颅娄茅聶聞氓卤聻氓搂芦猫路炉':'忙聺卤忙麓聥氓陇搂氓搂芦猫路炉',
    '氓陇搂茅聵陋忙隆聬猫聰颅茅芦聵忙聽隆':'氓陇搂茅聵陋忙隆聬猫聰颅','忙隆聬猫聰颅':'氓陇搂茅聵陋忙隆聬猫聰颅',
    '忙篓陋忙碌聹茅芦聵忙聽隆':'忙篓陋忙碌聹','氓赂聺盲潞卢茅芦聵忙聽隆':'氓赂聺盲潞卢',

    '猫聤卤氓路禄忙聺卤茅芦聵忙聽隆':'猫聤卤氓路禄忙聺卤','氓聟芦忙聢赂氓颅娄茅聶垄氓聟聣忙聵聼茅芦聵忙聽隆':'氓聟芦忙聢赂氓颅娄茅聶垄氓聟聣忙聵聼',

// R1P茫聛庐氓炉戮忙聢娄茫聛聥茫聜聣忙颅拢茫聛聴茫聛聞match ID茫聛芦茫聝聻茫聝聝茫聝聰茫聝鲁茫聜掳
// fetch茫聛聴茫聛聼茫聝聡茫聝录茫聜驴茫聛炉茫聙聦氓聥聺猫聙聟忙聽隆氓聬聧芒聠聮茫聛漏茫聛庐猫漏娄氓聬聢茫聛聥茫聙聧茫聜聮茅聙聠氓录聲茫聛聧茫聛聶茫聜聥
function applyFetchedResults(fetched){
  // fetched茫聛炉 {matchId: winner} 茫聛庐氓陆垄氓录聫茫聛搂忙聺楼茫聜聥忙聝鲁氓庐職
  // valid茫聛陋茫聜颅茫聝录
  const VALID_KEYS=[
    'r1_0','r1_1','r1_2','r1_3','r1_4','r1_5','r1_6','r1_7',
    'r1_8','r1_9','r1_10','r1_11','r1_12','r1_13','r1_14','r1_15',
    'r2_0','r2_1','r2_2','r2_3','r2_4','r2_5','r2_6','r2_7',
    'qf_0','qf_1','qf_2','qf_3','sf_0','sf_1','final'
  ];
  let updated=0;
  if(!ST.sc)ST.sc={};
  VALID_KEYS.forEach(k=>{
    const raw=fetched[k];
    if(!raw||raw==='null')return;
    const norm=normalizeName(String(raw));
    const valid=SC.some(s=>s.n===norm);
    if(!valid){console.warn('盲赂聧忙聵聨茫聛陋氓颅娄忙聽隆氓聬聧:',raw,'芒聠聮',norm);return;}
    if(ST.rs[k]!==norm){ST.rs[k]=norm;updated++;}
    if(fetchedSc&&fetchedSc[k])ST.sc[k]=fetchedSc[k];
    ST.fetchLocked=true;
  });
  return updated;
}

async function fetchResults(){
  const btn=document.getElementById('fbtn');
  const statusEl=document.getElementById('fs');
  if(btn)btn.disabled=true;
  fetchClass='loading';
  fetchLog='芒聫鲁 氓聫聳氓戮聴盲赂颅...';
  if(statusEl){statusEl.className='fetch-status loading';statusEl.textContent=fetchLog;}

  // 茅聵陋莽楼聻莽聰虏氓颅聬氓聹聮莽聬聝氓聽麓氓聟卢氓录聫茫聜碌茫聜陇茫聝聢茫聛聥茫聜聣氓聫聳氓戮聴
  const TARGET='https://koshien.hanshin.co.jp/highschool/spring2026/schedule.html';
  // 猫陇聡忙聲掳茫聝聴茫聝颅茫聜颅茫聜路茫聜聮茅聽聠莽聲陋茫聛芦猫漏娄茫聛聶
  const PROXIES=[
    `https://corsproxy.io/?${encodeURIComponent(TARGET)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(TARGET)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(TARGET)}`,
  ];

  let html=null;
  let fetchErr='氓聟篓茫聝聴茫聝颅茫聜颅茫聜路忙聨楼莽露職氓陇卤忙聲聴';
  for(const PROXY of PROXIES){
    try{
      const controller=new AbortController();
      const timer=setTimeout(()=>controller.abort(),8000);
      const r=await fetch(PROXY,{signal:controller.signal});
      clearTimeout(timer);
      if(!r.ok)continue;
      const text=await r.text();
      // allorigins氓陆垄氓录聫茂录聢JSON茂录聣茫聛聥HTML莽聸麓忙聨楼茫聛聥茫聜聮氓聢陇氓庐職
      let result=text;
      if(text.trimStart().startsWith('{')){
        try{const j=JSON.parse(text);if(j.contents)result=j.contents;}catch(e){}
      }
      if(result&&result.length>500&&result.includes('氓赂聺盲潞卢')){html=result;break;}
    }catch(e){
      fetchErr=e.name==='AbortError'?'茫聜驴茫聜陇茫聝聽茫聜垄茫聜娄茫聝聢':e.message;
      continue;
    }
  }

  if(!html){
    fetchClass='err';
    fetchLog='芒聺聦 氓聫聳氓戮聴氓陇卤忙聲聴: '+fetchErr;
    if(statusEl){statusEl.className='fetch-status err';statusEl.textContent=fetchLog;}
    if(btn)btn.disabled=false;
    return;
  }

  if(!html||html.length<500){
    fetchClass='err';
    fetchLog='芒聺聦 氓聫聳氓戮聴氓陇卤忙聲聴: 茫聝職茫聝录茫聜赂茫聛聦氓聫聳氓戮聴茫聛搂茫聛聧茫聛戮茫聛聸茫聜聯茫聛搂茫聛聴茫聛聼';
    if(statusEl){statusEl.className='fetch-status err';statusEl.textContent=fetchLog;}
    if(btn)btn.disabled=false;
    return;
  }

  // 茫聝職茫聝录茫聜赂氓聠聟茫聛庐茫聝聠茫聜颅茫聜鹿茫聝聢茫聜聮氓聫聳氓戮聴
  const parser=new DOMParser();
  const doc=parser.parseFromString(html,'text/html');
  const bodyText=(doc.body?.textContent||'').replace(/[ \t]+/g,' ');

  const fetched={};

  // 茅聵陋莽楼聻莽聰虏氓颅聬氓聹聮氓聟卢氓录聫: "忙聽隆氓聬聧A (茅聝陆茅聛聯氓潞聹莽聹聦)茫聜鹿茫聜鲁茫聜垄A - 茫聜鹿茫聜鲁茫聜垄B忙聽隆氓聬聧B (茅聝陆茅聛聯氓潞聹莽聹聦)"
  // 盲戮聥: "氓赂聺盲潞卢 (忙聺卤盲潞卢)4 - 3忙虏聳莽赂聞氓掳職氓颅娄 (忙虏聳莽赂聞)"
  // 忙聽隆氓聬聧茫聝聻茫聝聝茫聝聰茫聝鲁茫聜掳茂录聢氓聟卢氓录聫茫聜碌茫聜陇茫聝聢猫隆篓猫篓聵芒聠聮茫聜垄茫聝聴茫聝陋氓聠聟氓聬聧莽搂掳茂录聣
  const nameMap={
    '氓聟芦忙聢赂氓颅娄茅聶垄氓聟聣忙聵聼':'氓聟芦忙聢赂氓颅娄茅聶垄氓聟聣忙聵聼','茅芦聵莽聼楼猫戮虏':'茅芦聵莽聼楼猫戮虏','莽楼聻忙聢赂氓聸陆茅職聸氓陇搂盲禄聵':'莽楼聻忙聢赂氓聸陆茅職聸氓陇搂盲禄聵',
    '盲鹿聺氓路聻氓聸陆茅職聸氓陇搂盲禄聵':'盲鹿聺氓路聻氓聸陆茅職聸氓陇搂盲禄聵','氓赂聺盲潞卢':'氓赂聺盲潞卢','莽聠聤忙聹卢氓路楼':'莽聠聤忙聹卢氓路楼'
  };
  function normSite(n){return (nameMap[n.trim()]||n.trim());}

  // 茫聝聭茫聜驴茫聝录茫聝鲁: "忙聽隆氓聬聧 (茅聝陆茅聛聯氓潞聹莽聹聦)忙聲掳氓颅聴 - 忙聲掳氓颅聴忙聽隆氓聬聧 (茅聝陆茅聛聯氓潞聹莽聹聦)"
  const pat=/([^()\d\s][^()\d]{0,7})\s*\(([^)]{1,6})\)(\d+)\s*-\s*(\d+)([^()\d\s][^()\d]{0,7})\s*\(([^)]{1,6})\)/g;
  let m;
  window._fetchedSc={};
  const fetchedSc=window._fetchedSc;
  while((m=pat.exec(bodyText))!==null){
    const a=normSite(m[1]),sa=parseInt(m[3]),sb=parseInt(m[4]),b=normSite(m[5]);
    if(sa===sb)continue;
    const winner=sa>sb?a:b;
    R1P.forEach((pair,i)=>{
      const [ra,rb]=pair;
      if((ra===a&&rb===b)||(ra===b&&rb===a)){
        if(!fetched['r1_'+i]){
          fetched['r1_'+i]=winner;
          // 茫聜鹿茫聜鲁茫聜垄盲驴聺氓颅聵: [tA茫聛庐茫聜鹿茫聜鲁茫聜垄, tB茫聛庐茫聜鹿茫聜鲁茫聜垄]茂录聢R1P茫聛庐茅聽聠莽聲陋茫聛芦氓聬聢茫聜聫茫聛聸茫聜聥茂录聣
          fetchedSc['r1_'+i]=ra===a?[sa,sb]:[sb,sa];
        }
      }
    });
  }

  const updated=applyFetchedResults(fetched);
  if(updated>0)await sv();

  const now=new Date().toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  lastFetchTime=now;
  const found=Object.values(fetched).filter(Boolean).length;
  fetchClass='ok';
  fetchLog=found>0?`芒聹聟 ${now} 芒聙聰 ${updated}猫漏娄氓聬聢忙聸麓忙聳掳茂录聢${found}猫漏娄氓聬聢忙陇聹氓聡潞茂录聣`:`芒聹聟 ${now} 芒聙聰 莽碌聬忙聻聹茫聛陋茫聛聴茂录聢猫漏娄氓聬聢氓聣聧茫聛戮茫聛聼茫聛炉忙聹陋氓聫聧忙聵聽茂录聣`;
if(statusEl){statusEl.className='fetch-status ok';statusEl.textContent=fetchLog;}
  if(btn)btn.disabled=false;
    rAll();
}

// 氓陇搂盲录職忙聹聼茅聳聯盲赂颅茫聛庐氓陇聹茅聳聯茂录聢20忙聶聜盲禄楼茅聶聧茂录聣茫聛芦猫聡陋氓聥聲氓聫聳氓戮聴
async function autoFetchIfNeeded(){
  const now=new Date();
  const jst=new Date(now.getTime()+9*3600*1000);
  const y=jst.getUTCFullYear(),m=jst.getUTCMonth()+1,d=jst.getUTCDate(),h=jst.getUTCHours();
  // 氓陇搂盲录職忙聹聼茅聳聯: 2026/3/19茫聙聹4/4
  const inPeriod=(y===2026&&((m===3&&d>=19)||(m===4&&d<=4)));
  if(!inPeriod||h<20)return;
  await fetchResults();
}

  if(!localPlayer||localPlayer!==cw()){alert('茫聛聜茫聛陋茫聛聼茫聛庐莽聲陋茫聛搂茫聛炉茫聛聜茫聜聤茫聛戮茫聛聸茫聜聯');return;}
  _picking=true;
  const pl=cw();ST.pk[s]={pl,ri:ST.ri,wi:ST.wi};ST.wi++;
  if(ST.wi>=getWV(ST.ri).length){ST.wi=0;ST.ri++;}
  localPlayer=null;
  await sv();rAll();
  _picking=false;
}
async function undoPick(){
  // 氓聟篓忙聦聡氓聬聧茫聛庐盲赂颅茫聛搂忙聹聙氓戮聦茂录聢wi忙聹聙氓陇搂茫聝禄ri忙聹聙氓陇搂茂录聣茫聛庐茫聜聜茫聛庐茫聜聮忙聨垄茫聛聴茫聛娄氓聫聳茫聜聤忙露聢茫聛聶
  const all=Object.entries(ST.pk);
  if(!all.length){alert('氓聫聳茫聜聤忙露聢茫聛聸茫聜聥忙聦聡氓聬聧茫聛聦茫聛聜茫聜聤茫聛戮茫聛聸茫聜聯');return;}
  // ri忙聹聙氓陇搂芒聠聮茫聛聺茫聛庐盲赂颅茫聛搂wi忙聹聙氓陇搂
  const last=all.sort((a,b)=>b[1].ri!==a[1].ri?b[1].ri-a[1].ri:b[1].wi-a[1].wi)[0];
  const lastRi=last[1].ri;
  const lastWi=last[1].wi;
  delete ST.pk[last[0]];
  ST.ri=lastRi;
  ST.wi=lastWi;
  localPlayer=null;
  await sv();rAll();
}
async function advRnd(){ST.wi=0;ST.ri++;await sv();rAll();}
async function clearR(mid){
  if(localPlayer!=='忙聹卢氓路聺'){alert('盲驴庐忙颅拢茫聛炉忙聹卢氓路聺茫聛庐茫聛驴氓聫炉猫聝陆茫聛搂茫聛聶');return;}
  if(!confirm('茫聛聯茫聛庐猫漏娄氓聬聢茫聛庐莽碌聬忙聻聹茫聜聮氓聫聳茫聜聤忙露聢茫聛聴茫聛戮茫聛聶茫聛聥茂录聼'))return;
  delete ST.rs[mid];await sv();rResults();rScore();rPicks();
}

  if(!confirm('猫聡陋氓聥聲氓聫聳氓戮聴茫聝颅茫聝聝茫聜炉茫聜聮猫搂拢茅聶陇茫聛聴茫聛娄忙聣聥氓聥聲氓聟楼氓聤聸茫聜聮猫篓卤氓聫炉茫聛聴茫聛戮茫聛聶茫聛聥茂录聼'))return;

async function setR(mid,w){
  if(ST.fetchLocked){alert('猫聡陋氓聥聲氓聫聳氓戮聴忙赂聢茫聛驴茫聛庐茫聛聼茫聜聛忙聣聥氓聥聲氓聟楼氓聤聸茫聛炉茫聝颅茫聝聝茫聜炉茫聛聲茫聜聦茫聛娄茫聛聞茫聛戮茫聛聶');return;}
  if(ST.rs[mid]){return;} // 氓聟楼氓聤聸忙赂聢茫聛驴茫聛炉氓陇聣忙聸麓盲赂聧氓聫炉
  ST.rs[mid]=w;await sv();rResults();rScore();rPicks();
}
async function forceSync(){rAll();}
async function doRefresh(btn){
  if(btn){btn.style.opacity='.4';btn.style.pointerEvents='none';}
  try{
    await new Promise((res,rej)=>{
      const t=setTimeout(()=>rej(new Error('timeout')),5000);
      window._fbListen((data)=>{
        clearTimeout(t);
        mergeData(data);
        rAll();
        res();
      });
    });
  }catch(e){rAll();}
  if(btn){btn.style.opacity='1';btn.style.pointerEvents='';}
}
async function doReset(){
  if(!confirm('氓聟篓茫聝聡茫聝录茫聜驴茫聜聮茫聝陋茫聜禄茫聝聝茫聝聢茫聛聴茫聛戮茫聛聶茫聛聥茂录聼\n茫聛聯茫聛庐忙聯聧盲陆聹茫聛炉氓聟聝茫聛芦忙聢禄茫聛聸茫聛戮茫聛聸茫聜聯茫聙聜'))return;
  ST={ri:0,wi:0,sd:{},ss:{},so:false,snr:[],snrd:{},snrs:{},snro:false,pk:{},rs:{}};
  localPlayer=null;await sv();rAll();
}

let curPg='draft';
function gp(pg,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+pg).classList.add('on');
  if(btn)btn.classList.add('on');
  curPg=pg;rpg(pg);
}
function rpg(p){if(p==='draft')rDraft();else if(p==='picks')rPicks();else if(p==='results')rResults();else if(p==='score')rScore();else if(p==='rules')rRules();else if(p==='cfg')rCfg();}
function rAll(){rDraft();rPicks();rResults();rScore();rRules();rCfg();}

// Firebase忙聹陋忙聨楼莽露職茫聝聛茫聜搂茫聝聝茫聜炉莽聰篓
let fbReady = false;

(()=>{
  // Firebase茫聝陋茫聜鹿茫聝聤茫聝录茫聛聦忙潞聳氓聜聶茫聛搂茫聛聧茫聜聥茫聛戮茫聛搂氓戮聟茫聛陇
  const waitFb = setInterval(()=>{
    if(typeof window._fbListen !== 'function') return;
    clearInterval(waitFb);
    fbReady = true;

    // 茫聝陋茫聜垄茫聝芦茫聜驴茫聜陇茫聝聽茫聝陋茫聜鹿茫聝聤茫聝录: Firebase茫聛庐茫聝聡茫聝录茫聜驴茫聛聦氓陇聣茫聜聫茫聛拢茫聛聼茫聜聣氓聧鲁氓聫聧忙聵聽
    window._fbListen((data)=>{
      mergeData(data);
      rAll();
    });

    // 氓陇搂盲录職忙聹聼茅聳聯盲赂颅茫聝禄20忙聶聜盲禄楼茅聶聧茫聛陋茫聜聣猫聡陋氓聥聲氓聫聳氓戮聴茂录聢氓聢聺氓聸聻茫聛庐茫聛驴茂录聣
    autoFetchIfNeeded();
    // 1忙聶聜茅聳聯茫聛聰茫聛篓茫聛芦猫聡陋氓聥聲氓聠聧氓聫聳氓戮聴茫聝聛茫聜搂茫聝聝茫聜炉
    setInterval(()=>autoFetchIfNeeded(), 3600000);
  }, 200);

  // Firebase茫聛聦5莽搂聮茫聛搂莽鹿聥茫聛聦茫聜聣茫聛陋茫聛聭茫聜聦茫聛掳茫聜陋茫聝聲茫聝漏茫聜陇茫聝鲁茫聝垄茫聝录茫聝聣茫聛搂猫碌路氓聥聲
  setTimeout(()=>{
    if(!fbReady){
      console.warn('Firebase忙聹陋忙聨楼莽露職 芒聙聰 茫聜陋茫聝聲茫聝漏茫聜陇茫聝鲁茫聝垄茫聝录茫聝聣茫聛搂猫碌路氓聥聲');
      ST = EMPTY_ST();
      rAll();
    }
  }, 5000);
})();
